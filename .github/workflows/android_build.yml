name: Zero to Hero APK Generator - Multi-Mode Final

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 2. Создаем структуру папок
    - name: Create Project Structure
      run: |
        mkdir -p app/src/main/java/com/example/waparser
        mkdir -p app/src/main/res/xml
        mkdir -p app/src/main/res/values

    # 3. Генерируем gradle.properties
    - name: Generate gradle.properties
      run: |
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        EOF

    # 4. Генерируем корневой settings.gradle
    - name: Generate settings.gradle
      run: |
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "WAParser"
        include ':app'
        EOF

    # 5. Генерируем корневой build.gradle
    - name: Generate root build.gradle
      run: |
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2' apply false
            id 'org.jetbrains.kotlin.android' version '1.9.20' apply false
        }
        EOF

    # 6. Генерируем build.gradle модуля app
    - name: Generate app build.gradle
      run: |
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }
        android {
            namespace 'com.example.waparser'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.waparser"
                minSdk 26
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.10.0'
        }
        EOF

    # 7. Генерируем AndroidManifest.xml
    - name: Generate AndroidManifest.xml
      run: |
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            
            <application
                android:allowBackup="true"
                android:label="WA Call Parser"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <service
                    android:name=".WhatsappParserService"
                    android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.accessibilityservice.AccessibilityService" />
                    </intent-filter>
                    <meta-data
                        android:name="android.accessibilityservice"
                        android:resource="@xml/accessibility_service_config" />
                </service>
            </application>
        </manifest>
        EOF

    # 8. Конфиг Спец. возможностей
    - name: Generate Accessibility Config
      run: |
        cat << 'EOF' > app/src/main/res/xml/accessibility_service_config.xml
        <?xml version="1.0" encoding="utf-8"?>
        <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
            android:description="@string/accessibility_service_description"
            android:packageNames="com.whatsapp"
            android:accessibilityEventTypes="typeViewScrolled|typeWindowStateChanged"
            android:accessibilityFlags="flagDefault|flagIncludeNotImportantViews"
            android:accessibilityFeedbackType="feedbackGeneric"
            android:canRetrieveWindowContent="true" />
        EOF

    # 9. Строковые ресурсы
    - name: Generate strings.xml
      run: |
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">WA Call Parser</string>
            <string name="accessibility_service_description">Multi-mode Call Log Parser for WhatsApp.</string>
        </resources>
        EOF

    # 10. Генерируем MainActivity.kt
    - name: Generate MainActivity.kt
      run: |
        cat << 'EOF' > app/src/main/java/com/example/waparser/MainActivity.kt
        package com.example.waparser
        
        import android.content.Intent
        import android.net.Uri
        import android.os.Bundle
        import android.provider.Settings
        import android.widget.Button
        import android.widget.LinearLayout
        import androidx.appcompat.app.AppCompatActivity

        class MainActivity : AppCompatActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                
                val layout = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                    setPadding(30, 30, 30, 30)
                }

                val btnAccessibility = Button(this).apply {
                    text = "0. Enable Accessibility Service"
                    setOnClickListener {
                        startActivity(Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS))
                    }
                }

                val btnOverlay = Button(this).apply {
                    text = "Mode A: Grant Overlay & Create Button"
                    setOnClickListener {
                        if (!Settings.canDrawOverlays(this@MainActivity)) {
                            val intent = Intent(
                                Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                                Uri.parse("package:$packageName")
                            )
                            startActivity(intent)
                        } else {
                            val intentBroadcast = Intent("com.example.waparser.CREATE_BUTTON")
                            intentBroadcast.setPackage(packageName)
                            sendBroadcast(intentBroadcast)
                        }
                    }
                }

                val btnTimer = Button(this).apply {
                    text = "Mode B: Start 5s Timer & Open WA"
                    setOnClickListener {
                        val intentBroadcast = Intent("com.example.waparser.START_TIMER")
                        intentBroadcast.setPackage(packageName)
                        sendBroadcast(intentBroadcast)

                        val launchIntent = packageManager.getLaunchIntentForPackage("com.whatsapp")
                        if (launchIntent != null) {
                            startActivity(launchIntent)
                        }
                    }
                }

                val btnGesture = Button(this).apply {
                    text = "Mode C: Info (Just scroll in WA)"
                    setOnClickListener {
                        val launchIntent = packageManager.getLaunchIntentForPackage("com.whatsapp")
                        if (launchIntent != null) {
                            startActivity(launchIntent)
                        }
                    }
                }

                layout.addView(btnAccessibility)
                layout.addView(btnOverlay)
                layout.addView(btnTimer)
                layout.addView(btnGesture)
                setContentView(layout)
            }
        }
        EOF

    # 11. Генерируем WhatsappParserService.kt (Добавлен метод showToast + MediaStore для папки Documents)
    - name: Generate WhatsappParserService.kt
      run: |
        cat << 'EOF' > app/src/main/java/com/example/waparser/WhatsappParserService.kt
        package com.example.waparser
        
        import android.accessibilityservice.AccessibilityService
        import android.content.BroadcastReceiver
        import android.content.Context
        import android.content.Intent
        import android.content.IntentFilter
        import android.graphics.PixelFormat
        import android.view.Gravity
        import android.view.WindowManager
        import android.view.accessibility.AccessibilityEvent
        import android.view.accessibility.AccessibilityNodeInfo
        import android.util.Log
        import android.widget.Button
        import android.widget.Toast
        import java.io.File
        import android.os.Environment
        import android.os.Handler
        import android.os.Looper
        import android.provider.MediaStore
        import android.content.ContentValues
        import android.net.Uri

        class WhatsappParserService : AccessibilityService() {
            private val callLogs = mutableSetOf<String>()
            private val handler = Handler(Looper.getMainLooper())
            private var windowManager: WindowManager? = null
            private var floatingButton: Button? = null
            private var noNewDataCounter = 0
            private var isParsingActive = false

            private val modeReceiver = object : BroadcastReceiver() {
                override fun onReceive(context: Context?, intent: Intent?) {
                    when (intent?.action) {
                        "com.example.waparser.CREATE_BUTTON" -> {
                            this@WhatsappParserService.showToast("Overlay requested. Re-enable Service if button hidden.")
                            createFloatingButton()
                        }
                        "com.example.waparser.START_TIMER" -> {
                            this@WhatsappParserService.showToast("Timer armed! Go to Calls tab now...")
                            handler.postDelayed({
                                this@WhatsappParserService.showToast("Timer triggered parsing!")
                                noNewDataCounter = 0
                                parseCurrentScreenAndScroll()
                            }, 5000)
                        }
                    }
                }
            }

            override fun onServiceConnected() {
                super.onServiceConnected()
                val filter = IntentFilter().apply {
                    addAction("com.example.waparser.CREATE_BUTTON")
                    addAction("com.example.waparser.START_TIMER")
                }
                registerReceiver(modeReceiver, filter, Context.RECEIVER_NOT_EXPORTED)
            }

            override fun onAccessibilityEvent(event: AccessibilityEvent) {
                // РЕЖИМ С: Триггер на ручной жест прокрутки
                if (!isParsingActive && (event.eventType == AccessibilityEvent.TYPE_VIEW_SCROLLED || event.eventType == AccessibilityEvent.TYPE_WINDOW_STATE_CHANGED)) {
                    isParsingActive = true
                    noNewDataCounter = 0
                    showToast("Gesture detected: parsing...")
                    parseCurrentScreenAndScroll()
                }
            }

            private fun createFloatingButton() {
                if (floatingButton != null) return
                try {
                    windowManager = getSystemService(WINDOW_SERVICE) as WindowManager
                    floatingButton = Button(this).apply {
                        text = "PARSE"
                        setBackgroundColor(0xFF00AA00.toInt())
                        setTextColor(0xFFFFFFFF.toInt())
                        setOnClickListener {
                            this@WhatsappParserService.showToast("Button triggered parsing...")
                            noNewDataCounter = 0
                            parseCurrentScreenAndScroll()
                        }
                    }

                    val params = WindowManager.LayoutParams(
                        WindowManager.LayoutParams.WRAP_CONTENT,
                        WindowManager.LayoutParams.WRAP_CONTENT,
                        WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                        WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE,
                        PixelFormat.TRANSLUCENT
                    ).apply {
                        gravity = Gravity.TOP or Gravity.END
                        x = 10
                        y = 400
                    }
                    windowManager?.addView(floatingButton, params)
                } catch (e: Exception) {
                    Log.e("WAParser", "Overlay creation failed", e)
                }
            }

            private fun parseCurrentScreenAndScroll() {
                isParsingActive = true
                val rootNode = rootInActiveWindow
                if (rootNode == null) {
                    handler.postDelayed({ parseCurrentScreenAndScroll() }, 1000)
                    return
                }

                val foundTexts = mutableListOf<String>()
                extractAllTexts(rootNode, foundTexts)
                
                var addedInThisPass = 0

                for (i in 0 until foundTexts.size) {
                    val currentText = foundTexts[i].trim()
                    
                    if (currentText.contains(":") || currentText.contains("Today") || currentText.contains("Yesterday") || currentText.matches(".*[A-Za-z]+\\s+\\d+.*".toRegex())) {
                        val potentialContact = foundTexts.getOrNull(i - 1)?.trim() ?: "Unknown"
                        
                        if (potentialContact.length > 1 && potentialContact != currentText && potentialContact != "Recent" && potentialContact != "Calls") {
                            val logLine = "$potentialContact;$currentText"
                            if (callLogs.add(logLine)) {
                                addedInThisPass++
                            }
                        }
                    }
                }

                val scrollableNode = findScrollableContainer(rootNode)
                if (scrollableNode != null && addedInThisPass > 0) {
                    noNewDataCounter = 0
                    showToast("Collected: ${callLogs.size} logs")
                    scrollableNode.performAction(AccessibilityNodeInfo.ACTION_SCROLL_FORWARD)
                    handler.postDelayed({ parseCurrentScreenAndScroll() }, 1500)
                } else if (scrollableNode != null && addedInThisPass == 0 && noNewDataCounter < 2) {
                    noNewDataCounter++
                    scrollableNode.performAction(AccessibilityNodeInfo.ACTION_SCROLL_FORWARD)
                    handler.postDelayed({ parseCurrentScreenAndScroll() }, 1500)
                } else {
                    saveLogsToDisk()
                }
            }

            private fun extractAllTexts(node: AccessibilityNodeInfo?, list: MutableList<String>) {
                if (node == null) return
                val nodeText = node.text?.toString() ?: node.contentDescription?.toString()
                if (nodeText != null && nodeText.isNotEmpty()) {
                    list.add(nodeText)
                }
                for (i in 0 until node.childCount) {
                    val child = node.getChild(i)
                    if (child != null) {
                        extractAllTexts(child, list)
                    }
                }
            }

            private fun findScrollableContainer(node: AccessibilityNodeInfo?): AccessibilityNodeInfo? {
                if (node == null) return null
                if (node.isScrollable) return node
                for (i in 0 until node.childCount) {
                    val child = node.getChild(i)
                    if (child != null) {
                        val result = findScrollableContainer(child)
                        if (result != null) return result
                    }
                }
                return null
            }

            private fun saveLogsToDisk() {
                try {
                    // Используем MediaStore API для сохранения прямо в публичную папку Documents без ROOT прав
                    val resolver = contentResolver
                    val contentValues = ContentValues().apply {
                        put(MediaStore.MediaColumns.DISPLAY_NAME, "whatsapp_calls_archive.csv")
                        put(MediaStore.MediaColumns.MIME_TYPE, "text/csv")
                        put(MediaStore.MediaColumns.RELATIVE_PATH, Environment.DIRECTORY_DOCUMENTS)
                    }
                    
                    val uri: Uri? = resolver.insert(MediaStore.Files.getContentUri("external"), contentValues)
                    if (uri != null) {
                        resolver.openOutputStream(uri).use { outputStream ->
                            outputStream?.write(("Contact;Details\n" + callLogs.joinToString("\n")).toByteArray())
                        }
                        showToast("SAVED SUCCESS! Check public Documents folder")
                    } else {
                        showToast("Save Error: Uri is null")
                    }
                } catch (e: Exception) {
                    Log.e("WAParser", "Write error", e)
                    showToast("Save Error: " + e.message)
                } finally {
                    isParsingActive = false
                }
            }

            private fun showToast(message: String) {
                handler.post {
                    Toast.makeText(applicationContext, message, Toast.LENGTH_SHORT).show()
                }
            }

            override fun onInterrupt() {}

            override fun onDestroy() {
                super.onDestroy()
                try {
                    unregisterReceiver(modeReceiver)
                    if (floatingButton != null && windowManager != null) {
                        windowManager?.removeView(floatingButton)
                    }
                } catch (e: Exception) {}
            }
        }
        EOF

    # 12. Окружение Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    # 13. Изолированный Gradle 8.6
    - name: Download Isolated Gradle 8.6
      run: |
        curl -sL https://services.gradle.org/distributions/gradle-8.6-bin.zip -o gradle.zip
        unzip -q gradle.zip

    # 14. Сборка APK
    - name: Build Debug APK via Isolated Gradle 8.6
      run: ./gradle-8.6/bin/gradle assembleDebug

    # 15. Отправка APK в артефакты сборки
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: multi-mode-documents-parser
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5