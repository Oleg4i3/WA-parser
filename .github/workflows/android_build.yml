name: Production Grade WA Parser

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Create Project Structure
      run: |
        mkdir -p app/src/main/java/com/example/waparser
        mkdir -p app/src/main/res/xml
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/drawable

    - name: Generate gradle.properties
      run: |
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        EOF

    - name: Generate settings.gradle
      run: |
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "WAParser"
        include ':app'
        EOF

    - name: Generate root build.gradle
      run: |
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2' apply false
            id 'org.jetbrains.kotlin.android' version '1.9.20' apply false
        }
        EOF

    - name: Generate app build.gradle
      run: |
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }
        android {
            namespace 'com.example.waparser'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.waparser"
                minSdk 26
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.10.0'
        }
        EOF

    - name: Generate App Vector Icon
      run: |
        cat << 'EOF' > app/src/main/res/drawable/ic_app_logo.xml
        <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp"
            android:height="108dp"
            android:viewportWidth="108"
            android:viewportHeight="108">
            <path
                android:fillColor="#075E54"
                android:pathData="M54,10C29.7,10 10,29.7 10,54C10,62.5 12.4,70.4 16.6,77.1L11,97L31.5,91.6C38,95.1 45.7,97 54,97C78.3,97 98,77.3 98,54C98,29.7 78.3,10 54,10Z"/>
            <path
                android:fillColor="#25D366"
                android:pathData="M54,14C31.9,14 14,31.9 14,54C14,61.7 16.2,68.9 20,75L15,93L33.6,88.1C39.5,91.3 46.5,93 54,93C76.1,93 94,75.1 94,54C94,31.9 76.1,14 54,14Z"/>
            <path
                android:fillColor="#FFFFFF"
                android:pathData="M35,38h38v5h-38z M35,49h38v5h-38z M35,60h24v5h-24z"/>
        </vector>
        EOF

    - name: Generate AndroidManifest.xml
      run: |
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            
            <application
                android:allowBackup="true"
                android:label="WA Call Tracker"
                android:icon="@drawable/ic_app_logo"
                android:roundIcon="@drawable/ic_app_logo"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <service
                    android:name=".WhatsappParserService"
                    android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.accessibilityservice.AccessibilityService" />
                    </intent-filter>
                    <meta-data
                        android:name="android.accessibilityservice"
                        android:resource="@xml/accessibility_service_config" />
                </service>
            </application>
        </manifest>
        EOF

    - name: Generate Accessibility Config
      run: |
        cat << 'EOF' > app/src/main/res/xml/accessibility_service_config.xml
        <?xml version="1.0" encoding="utf-8"?>
        <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
            android:description="@string/accessibility_service_description"
            android:accessibilityEventTypes="typeViewScrolled|typeWindowStateChanged"
            android:accessibilityFlags="flagDefault|flagIncludeNotImportantViews|flagRetrieveInteractiveWindows"
            android:accessibilityFeedbackType="feedbackGeneric"
            android:canRetrieveWindowContent="true"
            android:canPerformGestures="true" />
        EOF

    - name: Generate strings.xml
      run: |
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">WA Call Tracker</string>
            <string name="accessibility_service_description">Advanced Call Metrics Extractor for WhatsApp.</string>
        </resources>
        EOF

    - name: Generate MainActivity.kt
      run: |
        cat << 'EOF' > app/src/main/java/com/example/waparser/MainActivity.kt
        package com.example.waparser
        
        import android.content.Intent
        import android.net.Uri
        import android.os.Bundle
        import android.provider.Settings
        import android.graphics.Typeface
        import android.widget.*
        import androidx.appcompat.app.AppCompatActivity

        class MainActivity : AppCompatActivity() {
            
            companion object {
                var filterContactName: String = ""
                var countDaysOnly: Boolean = false
                private var instance: MainActivity? = null
                
                fun updateReportOnUI(report: String) {
                    instance?.runOnUiThread {
                        val tvReport = instance?.findViewById<TextView>(2001)
                        tvReport?.text = report
                    }
                }
            }

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                instance = this
                
                val scrollView = ScrollView(this)
                val layout = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                    setPadding(45, 45, 45, 45)
                }

                val btnAccessibility = Button(this).apply {
                    text = "1. Enable Accessibility Service"
                }
                btnAccessibility.setOnClickListener {
                    startActivity(Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS))
                }

                val btnOverlayPerm = Button(this).apply {
                    text = "2. Grant Overlay Permission"
                }
                btnOverlayPerm.setOnClickListener {
                    if (!Settings.canDrawOverlays(this@MainActivity)) {
                        val intent = Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:$packageName"))
                        startActivity(intent)
                    } else {
                        Toast.makeText(this@MainActivity, "Overlay already allowed", Toast.LENGTH_SHORT).show()
                    }
                }

                val lblFilter = TextView(this).apply {
                    text = "Contact Filter (Leave empty to scan EVERYONE):"
                    textSize = 15f
                    setPadding(0, 25, 0, 5)
                    setTypeface(null, Typeface.BOLD)
                }

                val txtFilter = EditText(this).apply {
                    hint = "e.g. John Doe (or blank)"
                    setText(filterContactName)
                }

                val chkDays = CheckBox(this).apply {
                    text = "Count unique days instead of calls"
                    isChecked = countDaysOnly
                }

                val btnLaunchOverlay = Button(this).apply {
                    text = "3. Launch Overlay Controller"
                    setBackgroundColor(0xFF075E54.toInt())
                    setTextColor(0xFFFFFFFF.toInt())
                }
                btnLaunchOverlay.setOnClickListener {
                    filterContactName = txtFilter.text.toString().trim()
                    countDaysOnly = chkDays.isChecked
                    
                    val service = WhatsappParserService.instance
                    if (service != null) {
                        if (Settings.canDrawOverlays(this@MainActivity)) {
                            service.createFloatingButton()
                            Toast.makeText(this@MainActivity, "Control Overlay Ready!", Toast.LENGTH_SHORT).show()
                        } else {
                            Toast.makeText(this@MainActivity, "Please allow overlay first!", Toast.LENGTH_SHORT).show()
                        }
                    } else {
                        Toast.makeText(this@MainActivity, "Accessibility Service NOT active!", Toast.LENGTH_LONG).show()
                    }
                }

                val lblReportHeader = TextView(this).apply {
                    text = "\n=== PARSE ANALYTICS REPORT ==="
                    textSize = 16f
                    setTypeface(null, Typeface.BOLD)
                }

                val tvReport = TextView(this).apply {
                    id = 2001
                    text = "No metrics collected yet. Trigger the overlay scan inside WhatsApp."
                    textSize = 14f
                    typeface = Typeface.MONOSPACE
                    setTextColor(0xFF111111.toInt())
                }

                layout.addView(btnAccessibility)
                layout.addView(btnOverlayPerm)
                layout.addView(lblFilter)
                layout.addView(txtFilter)
                layout.addView(chkDays)
                layout.addView(btnLaunchOverlay)
                layout.addView(lblReportHeader)
                layout.addView(tvReport)
                
                scrollView.addView(layout)
                setContentView(scrollView)
            }
        }
        EOF

    # ОБНОВЛЕНО: Добавлен разбор мультипликатора звонков вида "(3)" и ускорен безопасный скроллинг
    - name: Generate WhatsappParserService.kt
      run: |
        cat << 'EOF' > app/src/main/java/com/example/waparser/WhatsappParserService.kt
        package com.example.waparser
        
        import android.accessibilityservice.AccessibilityService
        import android.accessibilityservice.GestureDescription
        import android.graphics.Path
        import android.graphics.PixelFormat
        import android.view.Gravity
        import android.view.WindowManager
        import android.view.accessibility.AccessibilityEvent
        import android.view.accessibility.AccessibilityNodeInfo
        import android.util.Log
        import android.widget.Button
        import android.widget.Toast
        import java.io.File
        import android.os.Environment
        import android.os.Handler
        import android.os.Looper
        import android.provider.MediaStore
        import android.content.ContentValues
        import android.net.Uri

        class WhatsappParserService : AccessibilityService() {
            private val globalLogsMap = mutableMapOf<String, MutableList<String>>()
            private val handler = Handler(Looper.getMainLooper())
            private var windowManager: WindowManager? = null
            private var floatingButton: Button? = null
            private var emptyPassStreak = 0
            private var isParsingActive = false
            
            private var lastScreenRows = listOf<String>()

            companion object {
                var instance: WhatsappParserService? = null
            }

            fun showToast(message: String) {
                handler.post { Toast.makeText(applicationContext, message, Toast.LENGTH_SHORT).show() }
            }

            override fun onServiceConnected() {
                super.onServiceConnected()
                instance = this
                showToast("Data Harvester Core Active!")
            }

            override fun onAccessibilityEvent(event: AccessibilityEvent) {}

            fun createFloatingButton() {
                if (floatingButton != null) {
                    try { windowManager?.removeView(floatingButton) } catch(e: Exception){}
                    floatingButton = null
                }
                try {
                    windowManager = getSystemService(WINDOW_SERVICE) as WindowManager
                    floatingButton = Button(this).apply {
                        text = "START SCAN"
                        setBackgroundColor(0xFF25D366.toInt())
                        setTextColor(0xFFFFFFFF.toInt())
                        setOnClickListener {
                            if (this@WhatsappParserService.isParsingActive) {
                                this@WhatsappParserService.showToast("Halting & processing data...")
                                this@WhatsappParserService.processAndBuildReport()
                            } else {
                                text = "[STOP & REPORT]"
                                setBackgroundColor(0xFFCC0000.toInt())
                                this@WhatsappParserService.globalLogsMap.clear()
                                this@WhatsappParserService.lastScreenRows = emptyList()
                                this@WhatsappParserService.emptyPassStreak = 0
                                this@WhatsappParserService.parseCurrentScreenAndScroll()
                            }
                        }
                    }

                    val params = WindowManager.LayoutParams(
                        360, 140,
                        WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                        WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE,
                        PixelFormat.TRANSLUCENT
                    ).apply {
                        gravity = Gravity.TOP or Gravity.END
                        x = 30
                        y = 420
                    }
                    windowManager?.addView(floatingButton, params)
                } catch (e: Exception) {
                    Log.e("WAParser", "Overlay Window Error", e)
                }
            }

            private fun parseCurrentScreenAndScroll() {
                isParsingActive = true
                val rootNode = rootInActiveWindow
                if (rootNode == null) {
                    showToast("Error: Canvas Blind. Open WA Calls tab.")
                    resetOverlayButton()
                    isParsingActive = false
                    return
                }

                val foundTexts = mutableListOf<String>()
                extractAllTexts(rootNode, foundTexts)
                
                val currentScreenRows = mutableListOf<String>()
                for (i in 0 until foundTexts.size) {
                    val currentText = foundTexts[i].trim()
                    
                    if (currentText.contains(":") && (currentText.contains("Today") || currentText.contains("Yesterday") || currentText.matches(".*\\d.*".toRegex()))) {
                        val detectedContact = findContactNameForTimestamp(foundTexts, i)
                        if (detectedContact != "Unknown Contact") {
                            // КРИТИЧЕСКОЕ ОБНОВЛЕНИЕ: Извлекаем количество звонков из скобок (например, "(3)") и очищаем имя контакта
                            val groupMatch = Regex("\\s*\\((\\d+)\\)$").find(detectedContact)
                            val multiplier = groupMatch?.groupValues?.get(1)?.toInt() ?: 1
                            val cleanedContact = detectedContact.replace(Regex("\\s*\\(\\d+\\)$"), "").trim()
                            
                            // Сохраняем строку с метаинформацией о множителе
                            currentScreenRows.add("${cleanedContact}_#_${currentText}_#_${multiplier}")
                        }
                    }
                }

                var overlapIndex = 0
                if (lastScreenRows.isNotEmpty()) {
                    for (len in lastScreenRows.size downTo 1) {
                        if (len <= currentScreenRows.size) {
                            val suffix = lastScreenRows.subList(lastScreenRows.size - len, lastScreenRows.size)
                            val prefix = currentScreenRows.subList(0, len)
                            if (suffix == prefix) {
                                overlapIndex = len
                                break
                            }
                        }
                    }
                }

                val trulyNewRows = currentScreenRows.drop(overlapIndex)
                val targetFilter = MainActivity.filterContactName.lowercase()
                
                for (row in trulyNewRows) {
                    val parts = row.split("_#_")
                    if (parts.size < 3) continue
                    val contact = parts[0]
                    val timestamp = parts[1]
                    val multiplier = parts[2].toIntOrNull() ?: 1
                    
                    val lowerContact = contact.lowercase()
                    if (targetFilter.isEmpty() || lowerContact.contains(targetFilter)) {
                        val list = globalLogsMap.getOrPut(contact) { mutableListOf() }
                        // Добавляем таймстамп столько раз, сколько звонков скрыто в этой строке
                        repeat(multiplier) {
                            list.add(timestamp)
                        }
                    }
                }

                lastScreenRows = currentScreenRows

                if (trulyNewRows.isEmpty() && currentScreenRows.isNotEmpty()) {
                    emptyPassStreak++
                    if (emptyPassStreak >= 3) {
                        showToast("Absolute bottom reached.")
                        processAndBuildReport()
                    } else {
                        performHardwareSwipeUp()
                    }
                } else {
                    emptyPassStreak = 0
                    showToast("Scanning logs...")
                    performHardwareSwipeUp()
                }
            }

            private fun findContactNameForTimestamp(texts: List<String>, timeIndex: Int): String {
                val systemTrash = setOf(
                    "recent", "calls", "search", "more options", "new call", 
                    "incoming", "outgoing", "missed", "audio call", "video call", 
                    "voice call", "arrow", "call again", "unanswered", "create call link"
                )
                for (k in timeIndex - 1 downTo 0) {
                    val t = texts[k].trim()
                    val tLower = t.lowercase()
                    if (t.isEmpty() || t.length < 2 || t.contains(":")) continue
                    
                    var isTrash = false
                    for (trash in systemTrash) {
                        if (tLower.contains(trash)) { isTrash = true; break }
                    }
                    if (isTrash) continue
                    return t
                }
                return "Unknown Contact"
            }

            // ОБНОВЛЕНО: Тайминги скроллинга изменены на скоростной турбо-профиль (250мс свайп, 650мс кулдаун)
            private fun performHardwareSwipeUp() {
                val metrics = resources.displayMetrics
                val swipePath = Path().apply {
                    moveTo(metrics.widthPixels / 2f, metrics.heightPixels * 0.75f)
                    lineTo(metrics.widthPixels / 2f, metrics.heightPixels * 0.25f)
                }
                val gestureBuilder = GestureDescription.Builder()
                gestureBuilder.addStroke(GestureDescription.StrokeDescription(swipePath, 0, 250))

                val status = dispatchGesture(gestureBuilder.build(), object : GestureResultCallback() {
                    override fun onCompleted(gestureDescription: GestureDescription?) {
                        super.onCompleted(gestureDescription)
                        handler.postDelayed({ parseCurrentScreenAndScroll() }, 650)
                    }
                    override fun onCancelled(gestureDescription: GestureDescription?) {
                        super.onCancelled(gestureDescription)
                        processAndBuildReport()
                    }
                }, null)

                if (!status) {
                    showToast("Navigation blocked. Re-enable accessibility!")
                    processAndBuildReport()
                }
            }

            private fun processAndBuildReport() {
                resetOverlayButton()
                isParsingActive = false

                if (globalLogsMap.isEmpty()) {
                    MainActivity.updateReportOnUI("Execution done: Zero target logs collected.")
                    return
                }

                val report = StringBuilder()
                val targetFilter = MainActivity.filterContactName
                val timeRegex = Regex("\\d{1,2}:\\d{2}")
                
                var finalFileName = "WA_Analytics_Global.txt"

                if (targetFilter.isEmpty()) {
                    report.append("MODE: GLOBAL SCAN (ALL CONTACTS)\n")
                    report.append("--------------------------------------\n")
                    
                    for ((contact, times) in globalLogsMap) {
                        val contactDaysMap = LinkedHashMap<String, MutableList<String>>()
                        for (t in times) {
                            val cleanDay = stripTimeToDay(t)
                            val timeOnly = timeRegex.find(t)?.value ?: ""
                            if (timeOnly.isNotEmpty()) {
                                contactDaysMap.getOrPut(cleanDay) { mutableListOf() }.add(timeOnly)
                            }
                        }

                        val totalMetricsCount = if (MainActivity.countDaysOnly) {
                            contactDaysMap.size
                        } else {
                            times.size
                        }
                        val unit = if (MainActivity.countDaysOnly) "days" else "calls"
                        
                        val lastCall = contactDaysMap.keys.firstOrNull() ?: "N/A"
                        val firstCall = contactDaysMap.keys.lastOrNull() ?: "N/A"
                        
                        report.append("👤 $contact\n")
                        report.append("   • Volume: $totalMetricsCount $unit\n")
                        report.append("   • Newest: $lastCall\n")
                        report.append("   • Oldest: $firstCall\n")
                        report.append("--------------------------------------\n")
                    }
                } else {
                    val realKey = globalLogsMap.keys.firstOrNull()
                    if (realKey == null) {
                        MainActivity.updateReportOnUI("Filter mismatch: target object non-identifiable.")
                        return
                    }
                    
                    val safeContactName = realKey.replace(Regex("[^a-zA-Z0-9а-яА-ЯёЁ_]"), "_").replace(Regex("_+"), "_")
                    finalFileName = "WA_Analytics_${safeContactName}.txt"

                    val times = globalLogsMap[realKey]!!

                    val daysMap = LinkedHashMap<String, MutableList<String>>()
                    for (t in times) {
                        val cleanDay = stripTimeToDay(t)
                        val timeOnly = timeRegex.find(t)?.value ?: ""
                        if (timeOnly.isNotEmpty()) {
                            daysMap.getOrPut(cleanDay) { mutableListOf() }.add(timeOnly)
                        }
                    }

                    val totalMetricsCount = if (MainActivity.countDaysOnly) {
                        daysMap.size
                    } else {
                        times.size
                    }
                    val unitLabel = if (MainActivity.countDaysOnly) "Total active days" else "Total call events"

                    val lastCallDate = daysMap.keys.firstOrNull() ?: "N/A"
                    val firstCallDate = daysMap.keys.lastOrNull() ?: "N/A"

                    report.append("TARGET ANALYSIS SUMMARY:\n")
                    report.append("Contact Name   : $realKey\n")
                    report.append("$unitLabel: $totalMetricsCount\n")
                    report.append("First Call Date: $firstCallDate\n")
                    report.append("Last Call Date : $lastCallDate\n\n")
                    
                    report.append("📅 DETAILED TIMELINE TABLE:\n")
                    report.append("%-22s | %s\n".format("Date / Day", "Occurrences / Time list"))
                    report.append("--------------------------------------\n")

                    for ((day, timeList) in daysMap) {
                        val formattedTimes = "(${timeList.reversed().joinToString(", ")})"
                        report.append("%-22s | %s\n".format(day, formattedTimes))
                    }
                }

                MainActivity.updateReportOnUI(report.toString())
                showToast("Report rendered successfully!")
                backupToStorage(report.toString(), finalFileName)
            }

            private fun stripTimeToDay(timestamp: String): String {
                val day = timestamp.replace(Regex("\\b\\d{1,2}:\\d{2}\\b"), "").replace(",", "").trim()
                return if (day.isEmpty()) "Today" else day
            }

            private fun backupToStorage(data: String, fileName: String) {
                try {
                    val values = ContentValues().apply {
                        put(MediaStore.MediaColumns.DISPLAY_NAME, fileName)
                        put(MediaStore.MediaColumns.MIME_TYPE, "text/plain")
                        put(MediaStore.MediaColumns.RELATIVE_PATH, Environment.DIRECTORY_DOCUMENTS)
                    }
                    val uri = contentResolver.insert(MediaStore.Files.getContentUri("external"), values)
                    uri?.let { contentResolver.openOutputStream(it)?.use { out -> out.write(data.toByteArray()) } }
                } catch (e: Exception) { Log.e("WAParser", "Backup failed", e) }
            }

            private fun extractAllTexts(node: AccessibilityNodeInfo?, list: MutableList<String>) {
                if (node == null) return
                val text = node.text?.toString() ?: node.contentDescription?.toString()
                if (!text.isNullOrEmpty()) list.add(text)
                for (i in 0 until node.childCount) {
                    val child = node.getChild(i)
                    if (child != null) extractAllTexts(child, list)
                }
            }

            private fun resetOverlayButton() {
                handler.post {
                    floatingButton?.text = "START SCAN"
                    floatingButton?.setBackgroundColor(0xFF25D366.toInt())
                }
            }

            override fun onInterrupt() {}

            override fun onDestroy() {
                super.onDestroy()
                instance = null
                if (floatingButton != null && windowManager != null) {
                    try { windowManager?.removeView(floatingButton) } catch (e: Exception) {}
                }
            }
        }
        EOF

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Download Isolated Gradle 8.6
      run: |
        curl -sL https://services.gradle.org/distributions/gradle-8.6-bin.zip -o gradle.zip
        unzip -q gradle.zip

    - name: Build Debug APK via Isolated Gradle 8.6
      run: ./gradle-8.6/bin/gradle assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: production-grade-tracker
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5