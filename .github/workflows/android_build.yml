name: Targeted WA Parser Generator

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Create Project Structure
      run: |
        mkdir -p app/src/main/java/com/example/waparser
        mkdir -p app/src/main/res/xml
        mkdir -p app/src/main/res/values

    - name: Generate gradle.properties
      run: |
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        EOF

    - name: Generate settings.gradle
      run: |
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "WAParser"
        include ':app'
        EOF

    - name: Generate root build.gradle
      run: |
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2' apply false
            id 'org.jetbrains.kotlin.android' version '1.9.20' apply false
        }
        EOF

    - name: Generate app build.gradle
      run: |
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }
        android {
            namespace 'com.example.waparser'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.waparser"
                minSdk 26
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.10.0'
        }
        EOF

    - name: Generate AndroidManifest.xml
      run: |
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            
            <application
                android:allowBackup="true"
                android:label="WA Targeted Parser"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <service
                    android:name=".WhatsappParserService"
                    android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.accessibilityservice.AccessibilityService" />
                    </intent-filter>
                    <meta-data
                        android:name="android.accessibilityservice"
                        android:resource="@xml/accessibility_service_config" />
                </service>
            </application>
        </manifest>
        EOF

    - name: Generate Accessibility Config
      run: |
        cat << 'EOF' > app/src/main/res/xml/accessibility_service_config.xml
        <?xml version="1.0" encoding="utf-8"?>
        <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
            android:description="@string/accessibility_service_description"
            android:accessibilityEventTypes="typeViewScrolled|typeWindowStateChanged"
            android:accessibilityFlags="flagDefault|flagIncludeNotImportantViews|flagRetrieveInteractiveWindows"
            android:accessibilityFeedbackType="feedbackGeneric"
            android:canRetrieveWindowContent="true"
            android:canPerformGestures="true" />
        EOF

    - name: Generate strings.xml
      run: |
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">WA Targeted Parser</string>
            <string name="accessibility_service_description">Targeted Call Log Analytics Engine for WhatsApp.</string>
        </resources>
        EOF

    # ИНТЕРФЕЙС: Добавлены поля фильтра, чекбокс и вывод отчета
    - name: Generate MainActivity.kt
      run: |
        cat << 'EOF' > app/src/main/java/com/example/waparser/MainActivity.kt
        package com.example.waparser
        
        import android.content.Intent
        import android.net.Uri
        import android.os.Bundle
        import android.provider.Settings
        import android.widget.*
        import androidx.appcompat.app.AppCompatActivity

        class MainActivity : AppCompatActivity() {
            
            companion object {
                var filterContactName: String = ""
                var countDaysOnly: Boolean = false
                private var instance: MainActivity? = null
                
                fun updateReportOnUI(report: String) {
                    instance?.runOnUiThread {
                        val tvReport = instance?.findViewById<TextView>(1005)
                        tvReport?.text = report
                    }
                }
            }

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                instance = this
                
                val layout = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                    setPadding(50, 50, 50, 50)
                }

                // 1. Права доступности
                val btnAccessibility = Button(this).apply {
                    text = "1. Enable Accessibility Service"
                    setOnClickListener {
                        startActivity(Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS))
                    }
                }

                // 2. Права оверлея
                val btnOverlayPerm = Button(this).apply {
                    text = "2. Grant Overlay Permission"
                    setOnClickListener {
                        if (!Settings.canDrawOverlays(this@MainActivity)) {
                            val intent = Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:$packageName"))
                            startActivity(intent)
                        } else {
                            Toast.makeText(this@MainActivity, "Overlay allowed!", Toast.LENGTH_SHORT).show()
                        }
                    }
                }

                // Инструкция ввода фильтра
                val lblFilter = TextView(this).apply {
                    text = "Target Contact Name Filter:"
                    textSize = 16f
                    setPadding(0, 30, 0, 10)
                }

                // Поле ввода имени
                val txtFilter = EditText(this).apply {
                    hint = "e.g. John Doe"
                    setText(filterContactName)
                }

                // Чекбокс фильтрации дней
                val chkDays = CheckBox(this).apply {
                    text = "Count unique days instead of total calls"
                    isChecked = countDaysOnly
                }

                // 3. Запуск контроллера
                val btnLaunchOverlay = Button(this).apply {
                    text = "3. Launch Control Overlay"
                    setBackgroundColor(0xFF007ACC.toInt())
                    setTextColor(0xFFFFFFFF.toInt())
                    setOnClickListener {
                        filterContactName = txtFilter.text.toString().trim()
                        countDaysOnly = chkDays.isChecked
                        
                        if (filterContactName.isEmpty()) {
                            Toast.makeText(this@MainActivity, "Please enter a contact name!", Toast.LENGTH_SHORT).show()
                            return@setOnClickListener
                        }
                        
                        val service = WhatsappParserService.instance
                        if (service != null) {
                            if (Settings.canDrawOverlays(this@MainActivity)) {
                                service.createFloatingButton()
                                Toast.makeText(this@MainActivity, "Overlay Ready! Open WA Calls", Toast.LENGTH_SHORT).show()
                            } else {
                                Toast.makeText(this@MainActivity, "Grant Overlay Perm First!", Toast.LENGTH_SHORT).show()
                            }
                        } else {
                            Toast.makeText(this@MainActivity, "Accessibility Service NOT running!", Toast.LENGTH_LONG).show()
                        }
                    }
                }

                // Заголовок отчета
                val lblReportHeader = TextView(this).apply {
                    text = "--- ANALYTICS REPORT ---"
                    textSize = 18f
                    setPadding(0, 50, 0, 10)
                }

                // Окно вывода результатов
                val tvReport = TextView(this).apply {
                    id = 1005
                    text = "No analytics gathered yet. Use overlay inside WhatsApp."
                    textSize = 16f
                    setTextColor(0xFF222222.toInt())
                }

                layout.addView(btnAccessibility)
                layout.addView(btnOverlayPerm)
                layout.addView(lblFilter)
                layout.addView(txtFilter)
                layout.addView(chkDays)
                layout.addView(btnLaunchOverlay)
                layout.addView(lblReportHeader)
                layout.addView(tvReport)
                setContentView(layout)
            }
        }
        EOF

    # ДВИЖОК СЕРВИСА: Логика снайперского парсинга, ручной остановки и подсчета
    - name: Generate WhatsappParserService.kt
      run: |
        cat << 'EOF' > app/src/main/java/com/example/waparser/WhatsappParserService.kt
        package com.example.waparser
        
        import android.accessibilityservice.AccessibilityService
        import android.accessibilityservice.GestureDescription
        import android.graphics.Path
        import android.graphics.PixelFormat
        import android.view.Gravity
        import android.view.WindowManager
        import android.view.accessibility.AccessibilityEvent
        import android.view.accessibility.AccessibilityNodeInfo
        import android.util.Log
        import android.widget.Button
        import android.widget.Toast
        import java.io.File
        import android.os.Environment
        import android.os.Handler
        import android.os.Looper
        import android.provider.MediaStore
        import android.content.ContentValues
        import android.net.Uri

        class WhatsappParserService : AccessibilityService() {
            // Храним только метки времени для отфильтрованного пользователя в порядке их обнаружения
            private val collectedTimestamps = mutableListOf<String>()
            private val handler = Handler(Looper.getMainLooper())
            private var windowManager: WindowManager? = null
            private var floatingButton: Button? = null
            private var blankCounter = 0
            private var isParsingActive = false

            companion object {
                var instance: WhatsappParserService? = null
            }

            fun showToast(message: String) {
                handler.post { Toast.makeText(applicationContext, message, Toast.LENGTH_SHORT).show() }
            }

            override fun onServiceConnected() {
                super.onServiceConnected()
                instance = this
                showToast("Targeted Core Activated!")
            }

            override fun onAccessibilityEvent(event: AccessibilityEvent) {}

            fun createFloatingButton() {
                if (floatingButton != null) {
                    windowManager?.removeView(floatingButton)
                    floatingButton = null
                }
                try {
                    windowManager = getSystemService(WINDOW_SERVICE) as WindowManager
                    floatingButton = Button(this).apply {
                        text = "START SCAN"
                        setBackgroundColor(0xFF00AA00.toInt()) // Green
                        setTextColor(0xFFFFFFFF.toInt())
                        textSize = 14f
                        setOnClickListener {
                            if (this@WhatsappParserService.isParsingActive) {
                                // Кнопка работает как СТОП триггер во время сканирования
                                this@WhatsappParserService.showToast("Interrupt requested. Building report...")
                                this@WhatsappParserService.saveLogsAndGenerateReport()
                            } else {
                                text = "[STOP & REPORT]"
                                setBackgroundColor(0xFFDD0000.toInt()) // Bright Red
                                this@WhatsappParserService.collectedTimestamps.clear()
                                this@WhatsappParserService.blankCounter = 0
                                this@WhatsappParserService.parseCurrentScreenAndScroll()
                            }
                        }
                    }

                    val params = WindowManager.LayoutParams(
                        380, // Фиксированная ширина для надежного отображения
                        140, // Фиксированная высота
                        WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                        WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE,
                        PixelFormat.TRANSLUCENT
                    ).apply {
                        gravity = Gravity.TOP or Gravity.END
                        x = 30
                        y = 400
                    }
                    windowManager?.addView(floatingButton, params)
                } catch (e: Exception) {
                    Log.e("WAParser", "Overlay creation error", e)
                }
            }

            private fun parseCurrentScreenAndScroll() {
                isParsingActive = true
                val rootNode = rootInActiveWindow
                if (rootNode == null) {
                    showToast("Error: Blind screen. Open WhatsApp.")
                    resetOverlayButton()
                    isParsingActive = false
                    return
                }

                val foundTexts = mutableListOf<String>()
                extractAllTexts(rootNode, foundTexts)
                
                val targetContact = MainActivity.filterContactName.lowercase()
                var addedInThisPass = 0

                // Снайперский поиск по элементам экрана
                for (i in 0 until foundTexts.size) {
                    val currentText = foundTexts[i].trim()
                    
                    if (currentText.lowercase().contains(targetContact)) {
                        // Нашли имя. Теперь ищем метку времени рядом в дереве элементов
                        var timestamp = ""
                        val checkOffsets = listOf(1, -1, 2, -2, 3, -3)
                        for (offset in checkOffsets) {
                            val targetIndex = i + offset
                            if (targetIndex in foundTexts.indices) {
                                val candidate = foundTexts[targetIndex]
                                if (candidate.contains(":") || candidate.contains("Today") || candidate.contains("Yesterday")) {
                                    timestamp = candidate.trim()
                                    break
                                }
                            }
                        }
                        
                        if (timestamp.isNotEmpty()) {
                            if (!collectedTimestamps.contains(timestamp)) {
                                collectedTimestamps.add(timestamp)
                                addedInThisPass++
                            }
                        }
                    }
                }

                if (addedInThisPass > 0) {
                    blankCounter = 0
                    showToast("Found $addedInThisPass entries. Swiping...")
                    performHardwareSwipeUp()
                } else {
                    blankCounter++
                    if (blankCounter < 3) {
                        // Попробуем проскроллить еще раз на случай микро-лагов отрисовки
                        performHardwareSwipeUp()
                    } else {
                        showToast("End of logs reached automatically.")
                        saveLogsAndGenerateReport()
                    }
                }
            }

            private fun performHardwareSwipeUp() {
                val displayMetrics = resources.displayMetrics
                val screenHeight = displayMetrics.heightPixels
                val screenWidth = displayMetrics.widthPixels

                val swipePath = Path().apply {
                    moveTo(screenWidth / 2f, screenHeight * 0.80f)
                    lineTo(screenWidth / 2f, screenHeight * 0.20f)
                }

                val gestureBuilder = GestureDescription.Builder()
                gestureBuilder.addStroke(GestureDescription.StrokeDescription(swipePath, 0, 400))

                val dispatched = dispatchGesture(gestureBuilder.build(), object : GestureResultCallback() {
                    override fun onCompleted(gestureDescription: GestureDescription?) {
                        super.onCompleted(gestureDescription)
                        handler.postDelayed({ parseCurrentScreenAndScroll() }, 1300)
                    }
                    override fun onCancelled(gestureDescription: GestureDescription?) {
                        super.onCancelled(gestureDescription)
                        saveLogsAndGenerateReport()
                    }
                }, null)

                if (!dispatched) {
                    showToast("Gesture system rejected. Re-enable accessibility.")
                    saveLogsAndGenerateReport()
                }
            }

            private fun saveLogsAndGenerateReport() {
                resetOverlayButton()
                isParsingActive = false
                
                val target = MainActivity.filterContactName
                if (collectedTimestamps.isEmpty()) {
                    MainActivity.updateReportOnUI("Contact: $target\nStatus: No matching calls detected.")
                    showToast("Analytics done: 0 records found.")
                    return
                }

                // Хронология: WhatsApp выдает логи сверху вниз (от новейших к старейшим)
                val lastCallDate = collectedTimestamps.first()  // Самый верхний
                val firstCallDate = collectedTimestamps.last()   // Самый нижний в конце скролла

                // Расчет метрики количества
                val finalCount = if (MainActivity.countDaysOnly) {
                    // Удаляем время (например "14:20" или ", 14:20"), оставляя только чистый день
                    collectedTimestamps.map { 
                        it.replace(Regex("\\b\\d{1,2}:\\d{2}\\b"), "").replace(",", "").trim() 
                    }.distinct().size
                } else {
                    collectedTimestamps.size
                }

                val metricLabel = if (MainActivity.countDaysOnly) "Total active days" else "Total call events"

                // Сборка текстового отчета
                val reportBuilder = StringBuilder().apply {
                    append("Contact Name: $target\n")
                    append("$metricLabel: $finalCount\n")
                    append("First Call Date: $firstCallDate\n")
                    append("Last Call Date: $lastCallDate")
                }.toString()

                // Отправляем отчет обратно в MainActivity
                MainActivity.updateReportOnUI(reportBuilder)
                showToast("Report compiled successfully!")

                // Локальный бэкап в CSV-файл на всякий случай
                try {
                    val resolver = contentResolver
                    val values = ContentValues().apply {
                        put(MediaStore.MediaColumns.DISPLAY_NAME, "Targeted_${target}_Report.csv")
                        put(MediaStore.MediaColumns.MIME_TYPE, "text/csv")
                        put(MediaStore.MediaColumns.RELATIVE_PATH, Environment.DIRECTORY_DOCUMENTS)
                    }
                    val uri: Uri? = resolver.insert(MediaStore.Files.getContentUri("external"), values)
                    uri?.let {
                        resolver.openOutputStream(it)?.use { out ->
                            out.write(("Metric;Value\nContact;$target\n$metricLabel;$finalCount\nFirst;$firstCallDate\nLast;$lastCallDate\n\nRaw Timestamps:\n" + collectedTimestamps.joinToString("\n")).toByteArray())
                        }
                    }
                } catch (e: Exception) {
                    Log.e("WAParser", "CSV preservation failed", e)
                }
            }

            private fun extractAllTexts(node: AccessibilityNodeInfo?, list: MutableList<String>) {
                if (node == null) return
                val text = node.text?.toString() ?: node.contentDescription?.toString()
                if (!text.isNullOrEmpty()) {
                    list.add(text)
                }
                for (i in 0 until node.childCount) {
                    val child = node.getChild(i)
                    if (child != null) extractAllTexts(child, list)
                }
            }

            private fun resetOverlayButton() {
                handler.post {
                    floatingButton?.text = "START SCAN"
                    floatingButton?.setBackgroundColor(0xFF00AA00.toInt())
                }
            }

            override fun onInterrupt() {}

            override fun onDestroy() {
                super.onDestroy()
                instance = null
                if (floatingButton != null && windowManager != null) {
                    try { windowManager?.removeView(floatingButton) } catch (e: Exception) {}
                }
            }
        }
        EOF

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Download Isolated Gradle 8.6
      run: |
        curl -sL https://services.gradle.org/distributions/gradle-8.6-bin.zip -o gradle.zip
        unzip -q gradle.zip

    - name: Build Debug APK via Isolated Gradle 8.6
      run: ./gradle-8.6/bin/gradle assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: targeted-smart-parser
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5