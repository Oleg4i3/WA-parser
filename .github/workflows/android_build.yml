name: Zero to Hero APK Generator - International Fix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Чекаутим репозиторий
    - name: Checkout
      uses: actions/checkout@v4

    # 2. Создаем структуру папок Android-проекта с нуля
    - name: Create Project Structure
      run: |
        mkdir -p app/src/main/java/com/example/waparser
        mkdir -p app/src/main/res/xml
        mkdir -p app/src/main/res/values

    # 3. Генерируем gradle.properties
    - name: Generate gradle.properties
      run: |
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        EOF

    # 4. Генерируем корневой settings.gradle
    - name: Generate settings.gradle
      run: |
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "WAParser"
        include ':app'
        EOF

    # 5. Генерируем корневой build.gradle
    - name: Generate root build.gradle
      run: |
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2' apply false
            id 'org.jetbrains.kotlin.android' version '1.9.20' apply false
        }
        EOF

    # 6. Генерируем build.gradle для модуля app
    - name: Generate app build.gradle
      run: |
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }
        android {
            namespace 'com.example.waparser'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.waparser"
                minSdk 26
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.10.0'
        }
        EOF

    # 7. Генерируем AndroidManifest.xml
    - name: Generate AndroidManifest.xml
      run: |
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
                android:allowBackup="true"
                android:label="WA Call Parser"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <service
                    android:name=".WhatsappParserService"
                    android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.accessibilityservice.AccessibilityService" />
                    </intent-filter>
                    <meta-data
                        android:name="android.accessibilityservice"
                        android:resource="@xml/accessibility_service_config" />
                </service>
            </application>
        </manifest>
        EOF

    # 8. Конфиг Спец. возможностей (нацелен на WhatsApp)
    - name: Generate Accessibility Config
      run: |
        cat << 'EOF' > app/src/main/res/xml/accessibility_service_config.xml
        <?xml version="1.0" encoding="utf-8"?>
        <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
            android:description="@string/accessibility_service_description"
            android:packageNames="com.whatsapp"
            android:accessibilityEventTypes="typeViewScrolled|typeWindowStateChanged"
            android:accessibilityFlags="flagDefault|flagIncludeNotImportantViews"
            android:accessibilityFeedbackType="feedbackGeneric"
            android:canRetrieveWindowContent="true" />
        EOF

    # 9. Строковые ресурсы
    - name: Generate strings.xml
      run: |
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">WA Call Parser</string>
            <string name="accessibility_service_description">Automatically extracts WhatsApp call history and saves it to a CSV file.</string>
        </resources>
        EOF

    # 10. Генерируем MainActivity.kt
    - name: Generate MainActivity.kt
      run: |
        cat << 'EOF' > app/src/main/java/com/example/waparser/MainActivity.kt
        package com.example.waparser
        
        import android.content.Intent
        import android.os.Bundle
        import android.provider.Settings
        import android.widget.Button
        import androidx.appcompat.app.AppCompatActivity

        class MainActivity : AppCompatActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                val button = Button(this)
                button.text = "1. Enable Service\n2. Open WhatsApp Calls"
                button.setOnClickListener {
                    val intent = Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS)
                    startActivity(intent)
                }
                setContentView(button)
            }
        }
        EOF

    # 11. Генерируем WhatsappParserService.kt (Адаптирован под английский UI + Toast уведомления)
    - name: Generate WhatsappParserService.kt
      run: |
        cat << 'EOF' > app/src/main/java/com/example/waparser/WhatsappParserService.kt
        package com.example.waparser
        
        import android.accessibilityservice.AccessibilityService
        import android.view.accessibility.AccessibilityEvent
        import android.view.accessibility.AccessibilityNodeInfo
        import android.util.Log
        import android.widget.Toast
        import java.io.File
        import android.os.Environment
        import android.os.Handler
        import android.os.Looper

        class WhatsappParserService : AccessibilityService() {
            private val callLogs = mutableSetOf<String>()
            private val handler = Handler(Looper.getMainLooper())

            override fun onAccessibilityEvent(event: AccessibilityEvent) {
                val rootNode = rootInActiveWindow ?: return
                val foundTexts = mutableListOf<String>()
                
                extractAllTexts(rootNode, foundTexts)
                
                var hasNewElements = false

                for (i in 0 until foundTexts.size) {
                    val currentText = foundTexts[i].trim()
                    
                    // Универсальные маркеры времени звонка для EN/RU интерфейсов (минуты, AM/PM, вчера/вчерашние даты)
                    if (currentText.contains(":") || currentText.contains(",", ignoreCase = true) || currentText.contains("yesterday", ignoreCase = true) || currentText.matches(".*\\d{2}.*".toRegex())) {
                        val potentialContact = foundTexts.getOrNull(i - 1)?.trim() ?: "Unknown"
                        
                        if (potentialContact.length > 1 && potentialContact != currentText) {
                            val logLine = "$potentialContact;$currentText"
                            if (callLogs.add(logLine)) {
                                hasNewElements = true
                                showToast("Found: $potentialContact")
                            }
                        }
                    }
                }

                val scrollableNode = findScrollableContainer(rootNode)
                if (scrollableNode != null && hasNewElements) {
                    scrollableNode.performAction(AccessibilityNodeInfo.ACTION_SCROLL_FORWARD)
                } else if (!hasNewElements && callLogs.isNotEmpty()) {
                    saveLogsToDisk()
                }
            }

            private fun extractAllTexts(node: AccessibilityNodeInfo?, list: MutableList<String>) {
                if (node == null) return
                val nodeText = node.text?.toString() ?: node.contentDescription?.toString()
                if (nodeText != null && nodeText.isNotEmpty()) {
                    list.add(nodeText)
                }
                for (i in 0 until node.childCount) {
                    val child = node.getChild(i)
                    if (child != null) {
                        extractAllTexts(child, list)
                    }
                }
            }

            private fun findScrollableContainer(node: AccessibilityNodeInfo?): AccessibilityNodeInfo? {
                if (node == null) return null
                if (node.isScrollable) return node
                for (i in 0 until node.childCount) {
                    val child = node.getChild(i)
                    if (child != null) {
                        val result = findScrollableContainer(child)
                        if (result != null) return result
                    }
                }
                return null
            }

            private fun saveLogsToDisk() {
                try {
                    val dir = getExternalFilesDir(Environment.DIRECTORY_DOWNLOADS)
                    if (dir != null) {
                        val file = File(dir, "whatsapp_calls_archive.csv")
                        val header = "Contact;Details\n"
                        file.writeText(header + callLogs.joinToString("\n"))
                        
                        showToast("Success! Saved ${callLogs.size} logs to Downloads")
                        Log.d("WAParser", "File written to: ${file.absolutePath}")
                    }
                    disableSelf()
                } catch (e: Exception) {
                    Log.e("WAParser", "Write error", e)
                }
            }

            private fun showToast(message: String) {
                handler.post {
                    Toast.makeText(applicationContext, message, Toast.LENGTH_SHORT).show()
                }
            }

            override fun onInterrupt() {}
        }
        EOF

    # 12. Окружение Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    # 13. Изолированный Gradle 8.6
    - name: Download Isolated Gradle 8.6
      run: |
        curl -sL https://services.gradle.org/distributions/gradle-8.6-bin.zip -o gradle.zip
        unzip -q gradle.zip

    # 14. Сборка APK
    - name: Build Debug APK via Isolated Gradle 8.6
      run: ./gradle-8.6/bin/gradle assembleDebug

    # 15. Отправка APK в артефакты сборки
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: international-whatsapp-parser
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5