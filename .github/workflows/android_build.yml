name: Android CI/CD - Vibe Build

# Запуск при каждом пуше в ветку main/master или вручную через интерфейс GitHub
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Позволяет тыкнуть кнопку "Run workflow" руками

jobs:
  build:
    name: Build APK artifact
    runs-on: ubuntu-latest

    steps:
    # 1. Забираем код из репозитория
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Поднимаем правильную Java (для современных Gradle/Android Studio нужен JDK 17 или 21)
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle # Автоматически кэширует зависимости, ускоряет повторные сборки

    # 3. Даем права на выполнение Gradle-скрипту (актуально, если кодишь на Windows)
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. Собираем отладочный APK (для тестов самое то, не требует ключей подписи)
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 5. Вытаскиваем готовый APK и пакуем в артефакты сборки
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: whatsapp-parser-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7 # Файл будет храниться неделю
